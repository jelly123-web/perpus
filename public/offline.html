<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Offline</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f8f6f1 0%, #fffdf9 100%);
            color: #1a2e35;
            padding: 24px;
        }
        .card {
            width: min(520px, 100%);
            background: #fff;
            border: 1px solid #e2ddd4;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 18px 42px rgba(87,59,33,.14);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }
        p {
            margin: 0;
            line-height: 1.6;
            color: #5a6d73;
        }
        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        button, a {
            border: 1px solid #c4956a;
            color: #fff;
            background: #c4956a;
            border-radius: 10px;
            padding: 10px 14px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Kamu sedang offline</h1>
        <p>Beberapa halaman yang sudah pernah dibuka masih bisa dipakai. Fitur yang butuh koneksi server akan aktif lagi saat internet kembali.</p>
        <div class="actions">
            <button onclick="location.reload()">Coba Lagi</button>
            <a href="/login">Ke Login</a>
        </div>
    </main>
</body>
</html>
